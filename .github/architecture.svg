<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="src" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    <linearGradient id="tfm" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="snk" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#0891b2"/>
    </linearGradient>
    <linearGradient id="qry" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="340" rx="16" fill="#0a0a0a"/>
  <rect x="1" y="1" width="798" height="338" rx="15" fill="none" stroke="#1a1a1a" stroke-width="1"/>

  <!-- Stage labels -->
  <text x="130" y="36" text-anchor="middle" fill="#3b82f6" font-size="13" font-weight="700" letter-spacing="2">SOURCES</text>
  <text x="400" y="36" text-anchor="middle" fill="#8b5cf6" font-size="13" font-weight="700" letter-spacing="2">TRANSFORMS</text>
  <text x="670" y="36" text-anchor="middle" fill="#06b6d4" font-size="13" font-weight="700" letter-spacing="2">SINKS</text>

  <!-- Source boxes -->
  <rect x="20" y="55" width="120" height="44" rx="8" fill="#111" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="80" y="82" text-anchor="middle" fill="#e5e5e5" font-size="13" font-weight="500">Files</text>

  <rect x="20" y="110" width="120" height="44" rx="8" fill="#111" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="80" y="137" text-anchor="middle" fill="#e5e5e5" font-size="13" font-weight="500">Git Repos</text>

  <rect x="20" y="165" width="120" height="44" rx="8" fill="#111" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="80" y="192" text-anchor="middle" fill="#e5e5e5" font-size="13" font-weight="500">Web Pages</text>

  <!-- Arrows: Sources → Transforms -->
  <line x1="140" y1="82" x2="280" y2="90" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="140" y1="132" x2="280" y2="130" stroke="#333" stroke-width="1.5"/>
  <line x1="140" y1="187" x2="280" y2="170" stroke="#333" stroke-width="1.5"/>

  <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#444"/>
  </marker>

  <!-- Transform boxes -->
  <rect x="280" y="65" width="130" height="44" rx="8" fill="#111" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="345" y="85" text-anchor="middle" fill="#c4b5fd" font-size="11">HTMLCleaner</text>
  <text x="345" y="100" text-anchor="middle" fill="#666" font-size="10">PIIRemover</text>

  <rect x="280" y="120" width="130" height="44" rx="8" fill="#111" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="345" y="140" text-anchor="middle" fill="#c4b5fd" font-size="11">Chunking</text>
  <text x="345" y="155" text-anchor="middle" fill="#666" font-size="10">Recursive / Semantic / Fixed</text>

  <rect x="280" y="175" width="130" height="44" rx="8" fill="#111" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="345" y="195" text-anchor="middle" fill="#c4b5fd" font-size="11">AutoEmbed</text>
  <text x="345" y="210" text-anchor="middle" fill="#666" font-size="10">Ollama / OpenAI / ST</text>

  <!-- Arrows: Transforms → Sinks -->
  <line x1="410" y1="132" x2="560" y2="100" stroke="#333" stroke-width="1.5"/>
  <line x1="410" y1="142" x2="560" y2="152" stroke="#333" stroke-width="1.5"/>
  <line x1="410" y1="197" x2="560" y2="200" stroke="#333" stroke-width="1.5"/>

  <!-- Sink boxes -->
  <rect x="560" y="75" width="120" height="44" rx="8" fill="#111" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="620" y="102" text-anchor="middle" fill="#e5e5e5" font-size="13" font-weight="500">Qdrant</text>

  <rect x="560" y="130" width="120" height="44" rx="8" fill="#111" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="620" y="157" text-anchor="middle" fill="#e5e5e5" font-size="13" font-weight="500">Pinecone</text>

  <rect x="560" y="185" width="120" height="44" rx="8" fill="#111" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="620" y="212" text-anchor="middle" fill="#e5e5e5" font-size="13" font-weight="500">JSON File</text>

  <!-- Divider -->
  <line x1="40" y1="250" x2="760" y2="250" stroke="#1a1a1a" stroke-width="1"/>

  <!-- Query section -->
  <text x="400" y="278" text-anchor="middle" fill="#10b981" font-size="13" font-weight="700" letter-spacing="2">QUERY</text>

  <rect x="240" y="290" width="130" height="36" rx="8" fill="#111" stroke="#10b981" stroke-width="1.5"/>
  <text x="305" y="313" text-anchor="middle" fill="#e5e5e5" font-size="12">User Question</text>

  <line x1="370" y1="308" x2="430" y2="308" stroke="#333" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <marker id="arrow2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#10b981"/>
  </marker>

  <rect x="430" y="290" width="140" height="36" rx="8" fill="#111" stroke="#10b981" stroke-width="1.5"/>
  <text x="500" y="306" text-anchor="middle" fill="#6ee7b7" font-size="11">Embed + Search</text>
  <text x="500" y="319" text-anchor="middle" fill="#666" font-size="10">Semantic / Keyword</text>

  <line x1="570" y1="308" x2="620" y2="308" stroke="#333" stroke-width="1.5" marker-end="url(#arrow2)"/>

  <rect x="620" y="290" width="120" height="36" rx="8" fill="#111" stroke="#10b981" stroke-width="1.5"/>
  <text x="680" y="313" text-anchor="middle" fill="#e5e5e5" font-size="12">Ranked Results</text>

  <!-- API badges -->
  <rect x="150" y="230" width="240" height="1" fill="none"/>
  <text x="270" y="245" text-anchor="middle" fill="#444" font-size="11">ragpipe.ingest()  →  ragpipe.query()</text>
</svg>
