<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 784 420" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#444"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10b981"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="784" height="420" rx="16" fill="#0a0a0a"/>
  <rect x="0.5" y="0.5" width="783" height="419" rx="16" fill="none" stroke="#1a1a1a" stroke-width="1"/>

  <!-- ====== INGEST PIPELINE SECTION ====== -->

  <!-- Stage labels -->
  <text x="112" y="40" text-anchor="middle" fill="#3b82f6" font-size="11" font-weight="700" letter-spacing="3">SOURCES</text>
  <text x="392" y="40" text-anchor="middle" fill="#8b5cf6" font-size="11" font-weight="700" letter-spacing="3">TRANSFORMS</text>
  <text x="672" y="40" text-anchor="middle" fill="#06b6d4" font-size="11" font-weight="700" letter-spacing="3">SINKS</text>

  <!-- ====== SOURCE BOXES (x=32, w=160) ====== -->
  <!-- Box 1: Files (y=60) -->
  <rect x="32" y="60" width="160" height="48" rx="8" fill="#111" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="112" y="80" text-anchor="middle" dominant-baseline="central" fill="#e5e5e5" font-size="13" font-weight="500">Files</text>
  <text x="112" y="96" text-anchor="middle" dominant-baseline="central" fill="#555" font-size="10">.py .md .txt .json</text>

  <!-- Box 2: Git Repos (y=120) -->
  <rect x="32" y="120" width="160" height="48" rx="8" fill="#111" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="112" y="140" text-anchor="middle" dominant-baseline="central" fill="#e5e5e5" font-size="13" font-weight="500">Git Repos</text>
  <text x="112" y="156" text-anchor="middle" dominant-baseline="central" fill="#555" font-size="10">GitHub · GitLab</text>

  <!-- Box 3: Web Pages (y=180) -->
  <rect x="32" y="180" width="160" height="48" rx="8" fill="#111" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="112" y="200" text-anchor="middle" dominant-baseline="central" fill="#e5e5e5" font-size="13" font-weight="500">Web Pages</text>
  <text x="112" y="216" text-anchor="middle" dominant-baseline="central" fill="#555" font-size="10">Crawl · Scrape</text>

  <!-- ====== ARROWS: Sources → Transforms (x1=192, x2=292) ====== -->
  <line x1="192" y1="84" x2="286" y2="84" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="192" y1="144" x2="286" y2="144" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="192" y1="204" x2="286" y2="204" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ====== TRANSFORM BOXES (x=292, w=200) ====== -->
  <!-- Box 1: Clean (y=60) -->
  <rect x="292" y="60" width="200" height="48" rx="8" fill="#111" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="392" y="80" text-anchor="middle" dominant-baseline="central" fill="#c4b5fd" font-size="12" font-weight="500">HTMLCleaner</text>
  <text x="392" y="96" text-anchor="middle" dominant-baseline="central" fill="#555" font-size="10">Strip tags · Remove scripts</text>

  <!-- Box 2: Chunk (y=120) -->
  <rect x="292" y="120" width="200" height="48" rx="8" fill="#111" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="392" y="140" text-anchor="middle" dominant-baseline="central" fill="#c4b5fd" font-size="12" font-weight="500">RecursiveChunker</text>
  <text x="392" y="156" text-anchor="middle" dominant-baseline="central" fill="#555" font-size="10">512 chars · 64 overlap</text>

  <!-- Box 3: Embed (y=180) -->
  <rect x="292" y="180" width="200" height="48" rx="8" fill="#111" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="392" y="200" text-anchor="middle" dominant-baseline="central" fill="#c4b5fd" font-size="12" font-weight="500">AutoEmbed</text>
  <text x="392" y="216" text-anchor="middle" dominant-baseline="central" fill="#555" font-size="10">Ollama → OpenAI → ST</text>

  <!-- ====== ARROWS: Transforms → Sinks (x1=492, x2=552) ====== -->
  <line x1="492" y1="84" x2="546" y2="84" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="492" y1="144" x2="546" y2="144" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="492" y1="204" x2="546" y2="204" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ====== SINK BOXES (x=552, w=200) ====== -->
  <!-- Box 1: Qdrant (y=60) -->
  <rect x="552" y="60" width="200" height="48" rx="8" fill="#111" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="652" y="80" text-anchor="middle" dominant-baseline="central" fill="#e5e5e5" font-size="13" font-weight="500">Qdrant</text>
  <text x="652" y="96" text-anchor="middle" dominant-baseline="central" fill="#555" font-size="10">Local · Cloud</text>

  <!-- Box 2: Pinecone (y=120) -->
  <rect x="552" y="120" width="200" height="48" rx="8" fill="#111" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="652" y="140" text-anchor="middle" dominant-baseline="central" fill="#e5e5e5" font-size="13" font-weight="500">Pinecone</text>
  <text x="652" y="156" text-anchor="middle" dominant-baseline="central" fill="#555" font-size="10">Serverless</text>

  <!-- Box 3: JSON (y=180) -->
  <rect x="552" y="180" width="200" height="48" rx="8" fill="#111" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="652" y="200" text-anchor="middle" dominant-baseline="central" fill="#e5e5e5" font-size="13" font-weight="500">JSON File</text>
  <text x="652" y="216" text-anchor="middle" dominant-baseline="central" fill="#555" font-size="10">Local prototyping</text>

  <!-- Pipeline API label -->
  <text x="392" y="252" text-anchor="middle" fill="#333" font-size="11">ragpipe.ingest("./docs") → ragpipe.Pipeline().run()</text>

  <!-- ====== DIVIDER ====== -->
  <line x1="32" y1="272" x2="752" y2="272" stroke="#1a1a1a" stroke-width="1" stroke-dasharray="6 4"/>

  <!-- ====== QUERY SECTION ====== -->

  <!-- Query label -->
  <text x="392" y="300" text-anchor="middle" fill="#10b981" font-size="11" font-weight="700" letter-spacing="3">QUERY</text>

  <!-- Box 1: User Question (x=32, y=316) -->
  <rect x="120" y="316" width="160" height="48" rx="8" fill="#111" stroke="#10b981" stroke-width="1.5"/>
  <text x="200" y="336" text-anchor="middle" dominant-baseline="central" fill="#e5e5e5" font-size="13" font-weight="500">User Question</text>
  <text x="200" y="352" text-anchor="middle" dominant-baseline="central" fill="#555" font-size="10">Natural language</text>

  <!-- Arrow 1 -->
  <line x1="280" y1="340" x2="304" y2="340" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- Box 2: Embed + Search (x=310, y=316) -->
  <rect x="310" y="316" width="164" height="48" rx="8" fill="#111" stroke="#10b981" stroke-width="1.5"/>
  <text x="392" y="336" text-anchor="middle" dominant-baseline="central" fill="#6ee7b7" font-size="12" font-weight="500">Embed + Search</text>
  <text x="392" y="352" text-anchor="middle" dominant-baseline="central" fill="#555" font-size="10">Semantic · Keyword</text>

  <!-- Arrow 2 -->
  <line x1="474" y1="340" x2="498" y2="340" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- Box 3: Results (x=504, y=316) -->
  <rect x="504" y="316" width="160" height="48" rx="8" fill="#111" stroke="#10b981" stroke-width="1.5"/>
  <text x="584" y="336" text-anchor="middle" dominant-baseline="central" fill="#e5e5e5" font-size="13" font-weight="500">Ranked Results</text>
  <text x="584" y="352" text-anchor="middle" dominant-baseline="central" fill="#555" font-size="10">Scored chunks</text>

  <!-- Arrow 3 -->
  <line x1="664" y1="340" x2="688" y2="340" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- Box 4: LLM (x=694, y=316) -->
  <rect x="694" y="316" width="60" height="48" rx="8" fill="#111" stroke="#10b981" stroke-width="1.5"/>
  <text x="724" y="340" text-anchor="middle" dominant-baseline="central" fill="#6ee7b7" font-size="13" font-weight="600">LLM</text>

  <!-- Query API label -->
  <text x="392" y="392" text-anchor="middle" fill="#333" font-size="11">ragpipe.query("How does auth work?")</text>
</svg>
